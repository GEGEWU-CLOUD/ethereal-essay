<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>飘渺随笔 Pro - 全屏浏览 · 代码折叠 · 猫咪陪伴</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg-primary: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-light: #e2e8f0;
            --tag-bg: #e2e8f0;
            --tag-text: #334155;
            --code-bg: #0f172a;
            --code-text: #e2e8f0;
            --desc-bg: #f8fafc;
            --desc-border: #3b82f6;
            --btn-outline: #3b82f6;
            --btn-primary-bg: #0f172a;
            --btn-primary-text: white;
            --modal-bg: white;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --sync-panel-bg: white;
            --search-bg: #f8fafc;
        }
        
        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-light: #334155;
            --tag-bg: #334155;
            --tag-text: #cbd5e1;
            --code-bg: #020617;
            --code-text: #cbd5e6;
            --desc-bg: #1e293b;
            --desc-border: #60a5fa;
            --btn-outline: #60a5fa;
            --btn-primary-bg: #60a5fa;
            --btn-primary-text: #0f172a;
            --modal-bg: #1e293b;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --sync-panel-bg: #1e293b;
            --search-bg: #334155;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', 'SF Pro Text', 'Inter', system-ui, sans-serif;
            padding: 2rem 1rem;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.2s ease;
            padding-bottom: 100px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.2rem; font-weight: 600; background: linear-gradient(135deg, #1e293b, #2d3e5f); background-clip: text; -webkit-background-clip: text; color: transparent; }
        body.dark-mode .header h1 { background: linear-gradient(135deg, #e2e8f0, #94a3b8); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .header p { color: var(--text-secondary); margin-top: 0.5rem; font-size: 1rem; }
        
        .toolbar {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 0.75rem 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border: 1px solid var(--border-light);
        }
        .search-box {
            flex: 2;
            min-width: 200px;
            display: flex;
            align-items: center;
            background: var(--search-bg);
            border-radius: 40px;
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border-light);
        }
        .search-box input { border: none; background: transparent; padding: 0.7rem 0; width: 100%; outline: none; color: var(--text-primary); }
        .search-box input::placeholder { color: var(--text-secondary); }
        .category-filter { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .category-btn {
            background: var(--tag-bg);
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--tag-text);
        }
        .category-btn.active { background: #3b82f6; color: white; }
        body.dark-mode .category-btn.active { background: #60a5fa; color: #0f172a; }
        .add-cat-btn {
            background: var(--tag-bg);
            border: dashed 1px var(--text-secondary);
            padding: 0.4rem 0.9rem;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
        }
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .theme-toggle {
            background: var(--tag-bg);
            border: 1px solid var(--border-light);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }
        .btn {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-primary);
        }
        .btn-primary { background: var(--btn-primary-bg); border-color: var(--btn-primary-bg); color: var(--btn-primary-text); }
        .btn-outline { border-color: var(--btn-outline); color: var(--btn-outline); }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.75rem; }
        .export-dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 110%;
            background: var(--modal-bg);
            min-width: 170px;
            box-shadow: var(--shadow);
            border-radius: 20px;
            z-index: 100;
            overflow: hidden;
            border: 1px solid var(--border-light);
        }
        .dropdown-content a { display: flex; align-items: center; gap: 10px; padding: 0.7rem 1rem; text-decoration: none; color: var(--text-primary); font-size: 0.85rem; cursor: pointer; }
        .dropdown-content a:hover { background: var(--tag-bg); }
        .export-dropdown:hover .dropdown-content { display: block; }
        
        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .command-card {
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
            cursor: context-menu;
        }
        .command-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .card-header { padding: 1rem 1.2rem 0.6rem; display: flex; justify-content: space-between; flex-wrap: wrap; border-bottom: 1px solid var(--border-light); }
        .command-title { font-family: monospace; font-weight: 700; background: var(--tag-bg); padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.8rem; color: var(--text-primary); word-break: break-all; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .category-tag { font-size: 0.7rem; background: var(--tag-bg); padding: 0.2rem 0.7rem; border-radius: 30px; color: var(--tag-text); }
        .command-body { padding: 1rem 1.2rem; flex: 1; display: flex; flex-direction: column; }
        
        .command-desc {
            background: var(--desc-bg);
            padding: 0.7rem;
            border-radius: 16px;
            border-left: 3px solid var(--desc-border);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .code-wrapper {
            margin: 0.5rem 0;
            border-radius: 16px;
            background: var(--code-bg);
            overflow: hidden;
        }
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.8rem;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid var(--border-light);
        }
        .code-lang { font-size: 0.7rem; color: var(--text-secondary); font-family: monospace; }
        .toggle-code-btn {
            background: #334155;
            border: none;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            cursor: pointer;
        }
        .toggle-code-btn:hover { background: #3b82f6; }
        .code-block {
            padding: 0.8rem;
            position: relative;
            overflow-x: auto;
            transition: max-height 0.3s ease;
        }
        .code-block.collapsed { max-height: 150px; overflow-y: hidden; }
        .code-block.expanded { max-height: 500px; overflow-y: auto; }
        .code-block pre { margin: 0; padding: 0; background: transparent; font-family: monospace; font-size: 0.7rem; line-height: 1.5; white-space: pre; }
        .code-block code { font-family: inherit; background: transparent; color: var(--code-text); white-space: pre; }
        .copy-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: #334155;
            border: none;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            cursor: pointer;
            z-index: 10;
        }
        .copy-btn:hover { background: #10b981; }
        
        .example {
            margin-top: 0.8rem;
            font-size: 0.75rem;
            background: var(--tag-bg);
            padding: 0.7rem;
            border-radius: 12px;
            color: var(--text-secondary);
            word-break: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
            max-height: 100px;
            overflow-y: auto;
        }
        .example strong { color: var(--text-primary); display: inline-block; margin-bottom: 4px; }
        
        /* 全屏浏览模态框 - 展开后完整显示，无滚动条滑块 */
        .fullscreen-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 10000;
            overflow-y: auto;
            padding: 2rem;
        }
        .fullscreen-content {
            max-width: 1000px;
            margin: 1rem auto;
            background: var(--bg-card);
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fullscreen-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: var(--bg-card);
        }
        .fullscreen-title {
            font-size: 1.3rem;
            font-weight: 700;
            font-family: monospace;
            background: var(--tag-bg);
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }
        .fullscreen-cat {
            background: var(--tag-bg);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .fullscreen-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0 0.5rem;
            line-height: 1;
        }
        .fullscreen-close:hover { color: #ef4444; }
        .fullscreen-body {
            padding: 2rem;
            max-height: 65vh;
            overflow-y: auto;
        }
        .fullscreen-section {
            margin-bottom: 2rem;
        }
        .fullscreen-section h4 {
            font-size: 1rem;
            margin-bottom: 0.8rem;
            color: var(--desc-border);
            border-left: 3px solid var(--desc-border);
            padding-left: 0.8rem;
        }
        .fullscreen-desc {
            background: var(--desc-bg);
            padding: 1rem;
            border-radius: 20px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        /* 全屏中的代码包装器 - 展开后完整显示无滚动条滑块 */
        .fullscreen-code-wrapper {
            border-radius: 20px;
            background: var(--code-bg);
            overflow: hidden;
        }
        .fullscreen-code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid var(--border-light);
        }
        .fullscreen-toggle-btn {
            background: #334155;
            border: none;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .fullscreen-toggle-btn:hover { background: #3b82f6; }
        /* 关键修改：代码块区域在折叠时限制高度，展开时高度自动（无滚动条滑块） */
        .fullscreen-code-block {
            padding: 1rem;
            overflow-x: auto;
            overflow-y: visible;
            transition: none;
        }
        .fullscreen-code-block.collapsed { 
            max-height: 200px; 
            overflow-y: hidden;
        }
        .fullscreen-code-block.expanded { 
            max-height: none !important; 
            overflow-y: visible !important;
        }
        .fullscreen-code-block pre {
            margin: 0;
            font-family: monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .fullscreen-code-block code { 
            color: var(--code-text);
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .fullscreen-example {
            background: var(--tag-bg);
            padding: 1rem;
            border-radius: 20px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }
        .fullscreen-actions {
            padding: 1rem 2rem 2rem;
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            border-top: 1px solid var(--border-light);
        }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--modal-bg); max-width: 800px; width: 90%; border-radius: 32px; padding: 1.8rem; border: 1px solid var(--border-light); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 6px; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 0.7rem; border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: monospace;
            font-size: 0.85rem;
        }
        .form-group textarea { font-family: monospace; white-space: pre-wrap; tab-size: 2; }
        .inline-row { display: flex; gap: 8px; align-items: center; }
        .inline-row select { flex: 1; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 12px; margin-top: 1.5rem; }
        .empty-state { text-align: center; padding: 3rem; background: var(--bg-card); border-radius: 40px; color: var(--text-secondary); }
        .sync-panel {
            background: var(--sync-panel-bg);
            border-radius: 24px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border: 1px solid var(--border-light);
        }
        .sync-status { font-size: 0.8rem; display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
        .badge { background: var(--tag-bg); padding: 0.2rem 0.6rem; border-radius: 30px; font-size: 0.7rem; }
        footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: var(--text-secondary); }
        
        .copy-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; z-index: 2000; animation: fadeOut 1.5s ease forwards; pointer-events: none; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        @media (max-width: 640px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .commands-grid { grid-template-columns: 1fr; }
            .fullscreen-content { margin: 0.5rem; }
            .fullscreen-body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧠 飘渺随笔 Pro 🐱</h1>
        <p>右键全屏浏览 · 代码折叠 · 自动换行 · 完整导出 · 动态分类 · 云端同步</p>
    </div>
    
    <div class="sync-panel">
        <div class="sync-status"><span>☁️ 云端同步</span><span id="syncIndicator" class="badge">未配置</span></div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="gistTokenInput" placeholder="GitHub Token" style="padding: 0.4rem 0.8rem; border-radius: 40px; border: 1px solid var(--border-light); background: var(--search-bg); color: var(--text-primary); width: 200px;">
            <input type="text" id="gistIdInput" placeholder="Gist ID" style="padding: 0.4rem 0.8rem; border-radius: 40px; border: 1px solid var(--border-light); background: var(--search-bg); color: var(--text-primary); width: 140px;">
            <button id="saveGistConfigBtn" class="btn btn-outline">💾 保存</button>
            <button id="uploadToGistBtn" class="btn btn-outline">📤 上传</button>
            <button id="downloadFromGistBtn" class="btn btn-outline">📥 拉取</button>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-box"><span>🔍</span><input type="text" id="searchInput" placeholder="搜索命令、描述或示例..."></div>
        <div class="category-filter" id="categoryFilter"></div>
        <div class="action-buttons">
            <button class="theme-toggle" id="themeToggleBtn">🌙 夜间模式</button>
            <button class="btn btn-primary" id="openAddBtn">➕ 新增命令</button>
            <div class="export-dropdown">
                <button class="btn btn-outline">📎 导出 ⏷</button>
                <div class="dropdown-content">
                    <a id="exportJsonBtn">📄 JSON</a>
                    <a id="exportMarkdownBtn">📝 Markdown</a>
                    <a id="exportCsvBtn">📊 CSV</a>
                    <a id="exportTxtBtn">📃 纯文本</a>
                </div>
            </div>
            <button class="btn btn-outline" id="importBtn">📂 导入</button>
        </div>
    </div>
    <div id="commandsContainer" class="commands-grid"></div>
    <footer>💡 提示：在任意命令卡片上<span style="background:#334155; padding:2px 8px; border-radius:20px;">右键</span>可全屏浏览 | 代码块可展开/收起</footer>
</div>

<!-- 全屏浏览模态框 -->
<div id="fullscreenModal" class="fullscreen-modal">
    <div class="fullscreen-content">
        <div class="fullscreen-header">
            <span class="fullscreen-title" id="fsTitle">命令标题</span>
            <span class="fullscreen-cat" id="fsCategory">分类</span>
            <button class="fullscreen-close" id="fsCloseBtn">&times;</button>
        </div>
        <div class="fullscreen-body" id="fsBody"></div>
        <div class="fullscreen-actions">
            <button class="btn btn-outline" id="fsCopyBtn">📋 复制命令</button>
            <button class="btn btn-primary" id="fsEditBtn">✏️ 编辑</button>
        </div>
    </div>
</div>

<div id="commandModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">📌 命令</h3>
        <form id="commandForm">
            <div class="form-group"><label>命令内容 *</label><textarea id="cmdName" rows="8" required></textarea></div>
            <div class="form-group"><label>分类</label><div class="inline-row"><select id="cmdCategory"></select><button type="button" id="quickAddCategoryBtn" class="btn btn-sm">➕ 新建</button></div></div>
            <div class="form-group"><label>描述</label><textarea id="cmdDesc" rows="2"></textarea></div>
            <div class="form-group"><label>示例/备注</label><textarea id="cmdExample" rows="3"></textarea></div>
            <input type="hidden" id="editId">
            <div class="modal-buttons"><button type="button" class="btn" id="closeModalBtn">取消</button><button type="submit" class="btn btn-primary">保存</button></div>
        </form>
    </div>
</div>

<div id="newCategoryModal" class="modal">
    <div class="modal-content" style="max-width: 380px;">
        <h3>🏷️ 新建分类</h3>
        <div class="form-group"><label>分类名称</label><input type="text" id="newCategoryName" placeholder="例如: Python, 运维"></div>
        <div class="modal-buttons"><button class="btn" id="cancelNewCatBtn">取消</button><button class="btn btn-primary" id="confirmNewCatBtn">创建</button></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
<script>
    window.addEventListener('load', () => { if(typeof L2Dwidget !== 'undefined') L2Dwidget.init({ model: { jsonPath: "https://unpkg.com/live2d-widget-model-hijiki@1.0.5/assets/hijiki.model.json", scale: 1 }, display: { position: "right", width: 150, height: 300, vOffset: -20 }, mobile: { show: true, scale: 0.5 }, react: { opacityDefault: 0.8 } }); });
    
    let currentFsCommand = null;
    
    // 全屏显示函数 - 展开后完整显示代码，无滚动条滑块
    function showFullscreen(cmd) {
        currentFsCommand = cmd;
        document.getElementById('fsTitle').innerText = cmd.name.split('\n')[0].substring(0, 80);
        document.getElementById('fsCategory').innerText = cmd.category;
        const highlighted = highlightCodeFull(cmd.name);
        const descHtml = `<div class="fullscreen-section"><h4>📝 描述</h4><div class="fullscreen-desc">${escapeHtml(cmd.description)}</div></div>`;
        // 代码区块 - 展开后无滚动条滑块（max-height: none, overflow-y: visible）
        const codeHtml = `
            <div class="fullscreen-section"><h4>💻 命令内容</h4>
            <div class="fullscreen-code-wrapper">
                <div class="fullscreen-code-header">
                    <span class="code-lang">📄 代码 / 命令</span>
                    <button class="fullscreen-toggle-btn" id="fsToggleCodeBtn">▼ 展开</button>
                </div>
                <div id="fs-code-block" class="fullscreen-code-block collapsed">
                    <pre><code class="hljs">${highlighted}</code></pre>
                </div>
            </div>
            </div>`;
        const exampleHtml = cmd.example ? `<div class="fullscreen-section"><h4>💡 示例/备注</h4><div class="fullscreen-example">${escapeHtml(cmd.example).replace(/\n/g, '<br>')}</div></div>` : '';
        document.getElementById('fsBody').innerHTML = descHtml + codeHtml + exampleHtml;
        document.getElementById('fullscreenModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
        
        // 绑定全屏中的折叠按钮 - 展开后完整显示，不出现滚动条滑块
        const fsToggleBtn = document.getElementById('fsToggleCodeBtn');
        const fsCodeBlock = document.getElementById('fs-code-block');
        if(fsToggleBtn && fsCodeBlock) {
            // 移除可能存在的旧监听，重新绑定
            const newBtn = fsToggleBtn.cloneNode(true);
            fsToggleBtn.parentNode.replaceChild(newBtn, fsToggleBtn);
            newBtn.addEventListener('click', () => {
                if(fsCodeBlock.classList.contains('collapsed')) {
                    fsCodeBlock.classList.remove('collapsed');
                    fsCodeBlock.classList.add('expanded');
                    newBtn.innerText = '▲ 收起';
                } else {
                    fsCodeBlock.classList.remove('expanded');
                    fsCodeBlock.classList.add('collapsed');
                    newBtn.innerText = '▼ 展开';
                }
            });
        }
        // 高亮全屏中的代码块
        if (typeof hljs !== 'undefined') {
            document.querySelectorAll('#fsBody pre code').forEach(block => {
                hljs.highlightElement(block);
            });
        }
    }
    
    function closeFullscreen() { document.getElementById('fullscreenModal').style.display = 'none'; document.body.style.overflow = ''; currentFsCommand = null; }
    function highlightCodeFull(code) {
        let lang = 'plaintext';
        if (code.includes('version:') && code.includes('services:')) lang = 'yaml';
        else if (code.includes('docker ') || code.includes('kubectl ')) lang = 'bash';
        else if (code.includes('{') && code.includes('}')) lang = 'json';
        try { return hljs.highlight(code, {language:lang}).value; } catch(e) { return escapeHtml(code); }
    }
    
    function showCopyToast() { const t = document.createElement('div'); t.className = 'copy-toast'; t.innerText = '✅ 已复制'; document.body.appendChild(t); setTimeout(() => t.remove(), 1500); }
    async function copyText(txt) { await navigator.clipboard.writeText(txt); showCopyToast(); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function highlightCode(code) {
        let lang = 'plaintext';
        if (code.includes('version:') && code.includes('services:')) lang = 'yaml';
        else if (code.includes('docker ') || code.includes('kubectl ')) lang = 'bash';
        else if (code.includes('{') && code.includes('}')) lang = 'json';
        try { return hljs.highlight(code, {language:lang}).value; } catch(e) { return escapeHtml(code); }
    }
    
    // IndexedDB
    const DB_NAME = 'CommandMasterDB', STORE_NAME = 'commands';
    let db = null;
    function openDB() { return new Promise((res,rej)=>{ const r=indexedDB.open(DB_NAME,5); r.onerror=()=>rej(r.error); r.onsuccess=()=>{ db=r.result; res(db); }; r.onupgradeneeded=e=>{ if(!e.target.result.objectStoreNames.contains(STORE_NAME)) e.target.result.createObjectStore(STORE_NAME,{keyPath:'id'}); }; }); }
    async function getAll() { if(!db) await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE_NAME,'readonly'), req=tx.objectStore(STORE_NAME).getAll(); req.onsuccess=()=>res(req.result||[]); req.onerror=()=>rej(req.error); }); }
    async function saveCmd(cmd) { if(!db) await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE_NAME,'readwrite'), req=tx.objectStore(STORE_NAME).put(cmd); req.onsuccess=()=>res(); req.onerror=()=>rej(req.error); }); }
    async function delCmd(id) { if(!db) await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE_NAME,'readwrite'), req=tx.objectStore(STORE_NAME).delete(id); req.onsuccess=()=>res(); req.onerror=()=>rej(req.error); }); }
    async function bulkImport(cmds) { if(!db) await openDB(); const tx=db.transaction(STORE_NAME,'readwrite'), store=tx.objectStore(STORE_NAME); await store.clear(); for(const c of cmds) store.put(c); return new Promise((res,rej)=>{ tx.oncomplete=res; tx.onerror=rej; }); }
    
    let commands = [];
    async function refresh() { commands = await getAll(); sortAndRender(); }
    async function commit(cmd) { await saveCmd(cmd); await refresh(); }
    async function remove(id) { await delCmd(id); await refresh(); }
    async function replaceAll(newCmds) { await bulkImport(newCmds); await refresh(); }
    
    const DEFAULT = [
        { id:"1", name:"version: '3'\nservices:\n  minio:\n    image: minio/minio:latest\n    container_name: minio-server\n    restart: always\n    ports:\n      - \"9000:9000\"\n      - \"9001:9001\"\n    environment:\n      MINIO_ROOT_USER: admin\n      MINIO_ROOT_PASSWORD: admin123456\n    volumes:\n      - ./minio/data:/data\n      - ./minio/config:/root/.minio\n    command: server --console-address \":9001\" /data", category:"Docker", description:"MinIO 对象存储完整 Docker Compose 配置。高性能对象存储，兼容S3 API。", example:"启动命令: docker-compose up -d\n访问控制台: http://localhost:9001\n默认账号: admin / admin123456" },
        { id:"2", name:"git log --oneline --graph --all --decorate", category:"Git", description:"以图形化方式查看所有分支的提交历史，直观展示代码演进路径。", example:"按 q 退出查看\n添加 --author=\"名字\" 筛选作者\n添加 --since=\"2024-01-01\" 按时间过滤" },
        { id:"3", name:"docker ps -a --format 'table {{.Names}}\\t{{.Status}}\\t{{.Image}}'", category:"Docker", description:"格式化列出所有容器（包括已停止的），自定义显示名称、状态和镜像。", example:"docker ps -a --filter status=exited\n# 只显示已停止的容器" },
        { id:"4", name:"curl -X GET 'https://api.github.com/repos/user/repo' -H 'Accept: application/vnd.github.v3+json'", category:"网络", description:"GitHub API 请求示例，获取仓库信息。", example:"需要替换 user 和 repo\n示例: curl -X GET 'https://api.github.com/repos/octocat/Hello-World'" },
        { id:"5", name:"kubectl get pods -n default -o wide --watch", category:"K8s", description:"实时监控 Pod 状态变化，显示详细信息。", example:"按 Ctrl+C 退出\n添加 --all-namespaces 查看所有命名空间" }
    ];
    
    let allCats = new Set();
    function refreshCats() { allCats.clear(); commands.forEach(c=>{ if(c.category) allCats.add(c.category); }); if(allCats.size===0) ["Git","Docker","Linux","网络","K8s"].forEach(c=>allCats.add(c)); }
    function getCatList() { return Array.from(allCats).sort(); }
    
    let curCat = "全部", curSearch = "";
    function filterCmds() { return commands.filter(c=>{ if(curCat!=="全部" && c.category!==curCat) return false; if(!curSearch.trim()) return true; const s=curSearch.toLowerCase(); return c.name.toLowerCase().includes(s) || c.description.toLowerCase().includes(s) || (c.example && c.example.toLowerCase().includes(s)); }); }
    
    function renderCards() {
        const filtered = filterCmds();
        const container = document.getElementById('commandsContainer');
        if(filtered.length===0) { container.innerHTML='<div class="empty-state">✨ 暂无命令，点击新增</div>'; return; }
        container.innerHTML = filtered.map(cmd => {
            const highlighted = highlightCode(cmd.name);
            const shortTitle = cmd.name.split('\n')[0].substring(0, 50) + (cmd.name.split('\n')[0].length>50?'...':'');
            const descHtml = `<div class="command-desc">📘 ${escapeHtml(cmd.description)}</div>`;
            const exampleHtml = cmd.example ? `<div class="example"><strong>💡 示例/备注：</strong><br>${escapeHtml(cmd.example).replace(/\n/g, '<br>')}</div>` : '';
            const escapedRaw = escapeHtml(cmd.name).replace(/"/g, '&quot;');
            return `
            <div class="command-card" data-cmd-id="${cmd.id}">
                <div class="card-header"><span class="command-title" title="${escapeHtml(cmd.name.substring(0,100))}">${escapeHtml(shortTitle)}</span><span class="category-tag">${escapeHtml(cmd.category)}</span></div>
                <div class="command-body">
                    ${descHtml}
                    <div class="code-wrapper">
                        <div class="code-header"><span class="code-lang">📄 命令内容</span><button class="toggle-code-btn" data-target="code-${cmd.id}">▼ 展开</button></div>
                        <div id="code-${cmd.id}" class="code-block collapsed" data-raw="${escapedRaw}">
                            <pre><code class="hljs">${highlighted}</code></pre>
                            <button class="copy-btn" data-cmd="${escapedRaw}">📋 复制</button>
                        </div>
                    </div>
                    ${exampleHtml}
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px;">
                        <span style="font-size:0.65rem; opacity:0.6;">🖱️ 右键全屏浏览</span>
                        <div style="display:flex; gap:8px;">
                            <button class="edit-cmd-btn btn" data-id="${cmd.id}">✏️ 编辑</button>
                            <button class="delete-cmd-btn btn" data-id="${cmd.id}" style="border-color:#ef4444; color:#ef4444;">🗑️ 删除</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
        
        document.querySelectorAll('.toggle-code-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const targetId = btn.dataset.target;
                const codeBlock = document.getElementById(targetId);
                if(codeBlock) {
                    if(codeBlock.classList.contains('collapsed')) {
                        codeBlock.classList.remove('collapsed'); codeBlock.classList.add('expanded'); btn.innerText = '▲ 收起';
                    } else {
                        codeBlock.classList.remove('expanded'); codeBlock.classList.add('collapsed'); btn.innerText = '▼ 展开';
                    }
                }
                e.stopPropagation();
            });
        });
        
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                let raw = btn.dataset.cmd;
                if(raw) { raw = raw.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"'); await copyText(raw); }
            });
        });
        
        document.querySelectorAll('.command-card').forEach(card => {
            card.addEventListener('contextmenu', async (e) => {
                e.preventDefault();
                const id = card.querySelector('.edit-cmd-btn')?.dataset.id;
                if(id) { const cmd = commands.find(c => c.id === id); if(cmd) showFullscreen(cmd); }
                return false;
            });
        });
        
        document.querySelectorAll('.edit-cmd-btn').forEach(btn => btn.addEventListener('click', async (e) => { const id=btn.dataset.id; const c=commands.find(cmd=>cmd.id===id); if(c) openEdit(c); e.stopPropagation(); }));
        document.querySelectorAll('.delete-cmd-btn').forEach(btn => btn.addEventListener('click', async (e) => { if(confirm('永久删除？')) { await remove(btn.dataset.id); refreshCats(); renderCatFilter(); updateCatSelect(); } e.stopPropagation(); }));
    }
    
    function renderCatFilter() {
        const cats = getCatList();
        const div = document.getElementById('categoryFilter');
        let html = `<button class="category-btn ${curCat==='全部'?'active':''}" data-cat="全部">全部</button>`;
        cats.forEach(c=>{ html+=`<button class="category-btn ${curCat===c?'active':''}" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`; });
        html+=`<button class="add-cat-btn" id="globalAddCategoryBtn">➕ 新建分类</button>`;
        div.innerHTML = html;
        document.querySelectorAll('.category-btn').forEach(btn=>btn.addEventListener('click',e=>{ curCat=btn.dataset.cat; renderCatFilter(); renderCards(); }));
        document.getElementById('globalAddCategoryBtn')?.addEventListener('click',()=>openNewCatModal(null));
    }
    
    function updateCatSelect() {
        const sel = document.getElementById('cmdCategory');
        const cur = sel.value;
        const cats = getCatList();
        sel.innerHTML = cats.map(c=>`<option value="${escapeHtml(c)}" ${cur===c?'selected':''}>${escapeHtml(c)}</option>`).join('');
        if(cats.length===0) sel.innerHTML='<option>其他</option>';
    }
    
    async function sortAndRender() { refreshCats(); renderCatFilter(); updateCatSelect(); renderCards(); }
    
    const newCatModal = document.getElementById('newCategoryModal');
    let pendingCatCb = null;
    function openNewCatModal(cb) { pendingCatCb = cb || null; document.getElementById('newCategoryName').value=''; newCatModal.style.display='flex'; }
    function closeNewCatModal() { newCatModal.style.display='none'; pendingCatCb=null; }
    async function createNewCat() { const name = document.getElementById('newCategoryName').value.trim(); if(!name) return alert('请输入名称'); if(allCats.has(name)) { alert('分类已存在'); closeNewCatModal(); return; } allCats.add(name); renderCatFilter(); updateCatSelect(); if(pendingCatCb) pendingCatCb(name); else { curCat=name; renderCatFilter(); renderCards(); } closeNewCatModal(); }
    
    function openEdit(cmd) { updateCatSelect(); document.getElementById('cmdName').value=cmd.name; document.getElementById('cmdCategory').value=cmd.category; document.getElementById('cmdDesc').value=cmd.description; document.getElementById('cmdExample').value=cmd.example||''; document.getElementById('editId').value=cmd.id; document.getElementById('modalTitle').innerText='✏️ 编辑命令'; document.getElementById('commandModal').style.display='flex'; }
    function resetModal() { document.getElementById('cmdName').value=''; updateCatSelect(); const def=getCatList()[0]||'其他'; document.getElementById('cmdCategory').value=def; document.getElementById('cmdDesc').value=''; document.getElementById('cmdExample').value=''; document.getElementById('editId').value=''; document.getElementById('modalTitle').innerText='📌 新增命令'; }
    async function onSave(e) { e.preventDefault(); const name=document.getElementById('cmdName').value; if(!name.trim()) return alert('命令不能为空'); let cat=document.getElementById('cmdCategory').value; if(!cat) cat='其他'; const id=document.getElementById('editId').value || Date.now().toString(36)+Math.random().toString(36).substr(2,6); const cmd={id, name, category:cat, description:document.getElementById('cmdDesc').value.trim()||'无描述', example:document.getElementById('cmdExample').value.trim()}; await commit(cmd); document.getElementById('commandModal').style.display='none'; resetModal(); }
    
    function download(content, filename, mime) { const blob=new Blob([content],{type:mime}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href); }
    function exportJSON() { download(JSON.stringify(commands, null, 2), `commands_${Date.now()}.json`, 'application/json'); }
    function exportMarkdown() { let md = `# 飘渺随笔\n> 导出: ${new Date().toLocaleString()}\n> 总数: ${commands.length}\n\n`; commands.forEach((c,i)=>{ md += `## ${i+1}. ${c.category}\n\n**命令:**\n\`\`\`\n${c.name}\n\`\`\`\n\n**描述:** ${c.description}\n\n${c.example ? `**示例:** ${c.example}\n\n` : ''}---\n\n`; }); download(md, `commands_${Date.now()}.md`, 'text/markdown'); }
    function exportCSV() { const headers = ['命令', '分类', '描述', '示例']; const rows = commands.map(c => [`"${c.name.replace(/"/g,'""')}"`, `"${c.category.replace(/"/g,'""')}"`, `"${c.description.replace(/"/g,'""')}"`, `"${(c.example||'').replace(/"/g,'""')}"`].join(',')); download("\uFEFF" + [headers.join(','), ...rows].join('\n'), `commands_${Date.now()}.csv`, 'text/csv'); }
    function exportTxt() { let txt = `飘渺随笔导出 - ${new Date().toLocaleString()}\n共${commands.length}条\n\n`; commands.forEach((c,i)=>{ txt += `【${i+1}】${c.category}\n命令:\n${c.name}\n\n描述: ${c.description}\n${c.example ? `示例: ${c.example}\n` : ''}\n`; }); download(txt, `commands_${Date.now()}.txt`, 'text/plain'); }
    
    let gistToken = localStorage.getItem('gist_token') || '', gistId = localStorage.getItem('gist_id') || '';
    document.getElementById('gistTokenInput').value = gistToken; document.getElementById('gistIdInput').value = gistId;
    function updateSyncStatus() { const el = document.getElementById('syncIndicator'); if(gistToken && gistId) el.innerText = '✅ 已配置'; else if(gistToken) el.innerText = '⚙️ Token已配置'; else el.innerText = '🔴 未配置'; }
    document.getElementById('saveGistConfigBtn').addEventListener('click', () => { gistToken = document.getElementById('gistTokenInput').value.trim(); gistId = document.getElementById('gistIdInput').value.trim(); localStorage.setItem('gist_token', gistToken); localStorage.setItem('gist_id', gistId); updateSyncStatus(); alert('已保存'); });
    async function uploadToGist() { if(!gistToken) return alert('请输入Token'); const content=JSON.stringify(commands,null,2); const files={'command_master_db.json':{content}}; const url=gistId?`https://api.github.com/gists/${gistId}`:'https://api.github.com/gists'; const method=gistId?'PATCH':'POST'; const body=gistId?{files}:{description:'Command DB',public:false,files}; const res=await fetch(url,{method,headers:{'Authorization':`token ${gistToken}`,'Content-Type':'application/json'},body:JSON.stringify(body)}); if(res.ok){const data=await res.json(); if(!gistId){gistId=data.id; localStorage.setItem('gist_id',gistId); document.getElementById('gistIdInput').value=gistId; updateSyncStatus();} alert('上传成功');} else alert('上传失败'); }
    async function downloadFromGist() { if(!gistToken||!gistId) return alert('请配置Token和Gist ID'); const res=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{'Authorization':`token ${gistToken}`}}); if(res.ok){const data=await res.json(); const fc=data.files['command_master_db.json']?.content; if(fc){const rc=JSON.parse(fc); if(Array.isArray(rc)){if(confirm(`覆盖本地 ${commands.length} 条？`)){await replaceAll(rc); alert('同步成功');}}} else alert('无数据');} else alert('拉取失败'); }
    document.getElementById('uploadToGistBtn').addEventListener('click', uploadToGist);
    document.getElementById('downloadFromGistBtn').addEventListener('click', downloadFromGist);
    
    function setupImport() { const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json'; inp.onchange=async(e)=>{ const f=e.target.files[0]; if(!f) return; const reader=new FileReader(); reader.onload=async(ev)=>{ try{ const p=JSON.parse(ev.target.result); if(Array.isArray(p)){ await replaceAll(p.map(c=>({ id:c.id||Date.now()+Math.random(), name:c.name, category:c.category||'其他', description:c.description||'', example:c.example||'' }))); alert(`导入 ${commands.length} 条`); } else throw new Error(); } catch(err){ alert('无效JSON'); } }; reader.readAsText(f); }; document.getElementById('importBtn').addEventListener('click',()=>inp.click()); }
    
    let lastBackup = localStorage.getItem('last_backup_reminder')||0;
    window.addEventListener('beforeunload', (e) => { if(commands.length>0 && (Date.now()-parseInt(lastBackup))>7*24*3600000) { localStorage.setItem('last_backup_reminder',Date.now()); e.preventDefault(); e.returnValue='💡 建议导出备份'; return e.returnValue; } });
    
    function initTheme() { const saved=localStorage.getItem('theme'); if(saved==='dark'){ document.body.classList.add('dark-mode'); document.getElementById('themeToggleBtn').innerHTML='☀️ 白天'; } else { document.body.classList.remove('dark-mode'); document.getElementById('themeToggleBtn').innerHTML='🌙 夜间'; } }
    function toggleTheme() { if(document.body.classList.contains('dark-mode')){ document.body.classList.remove('dark-mode'); localStorage.setItem('theme','light'); document.getElementById('themeToggleBtn').innerHTML='🌙 夜间'; } else { document.body.classList.add('dark-mode'); localStorage.setItem('theme','dark'); document.getElementById('themeToggleBtn').innerHTML='☀️ 白天'; } }
    
    async function init() {
        initTheme();
        document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
        await openDB();
        let existing = await getAll();
        if(existing.length===0) { await bulkImport(DEFAULT); existing = DEFAULT; }
        commands = existing;
        await refresh();
        document.getElementById('searchInput').addEventListener('input', (e) => { curSearch = e.target.value; renderCards(); });
        document.getElementById('openAddBtn').addEventListener('click', () => { resetModal(); document.getElementById('commandModal').style.display='flex'; });
        document.getElementById('closeModalBtn').addEventListener('click', () => { document.getElementById('commandModal').style.display='none'; resetModal(); });
        document.getElementById('commandForm').addEventListener('submit', onSave);
        document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
        document.getElementById('exportMarkdownBtn').addEventListener('click', exportMarkdown);
        document.getElementById('exportCsvBtn').addEventListener('click', exportCSV);
        document.getElementById('exportTxtBtn').addEventListener('click', exportTxt);
        window.addEventListener('click', (e) => { if(e.target === document.getElementById('commandModal')) document.getElementById('commandModal').style.display='none'; if(e.target === newCatModal) closeNewCatModal(); if(e.target === document.getElementById('fullscreenModal')) closeFullscreen(); });
        document.getElementById('fsCloseBtn').addEventListener('click', closeFullscreen);
        document.getElementById('fsCopyBtn').addEventListener('click', async () => { if(currentFsCommand) await copyText(currentFsCommand.name); });
        document.getElementById('fsEditBtn').addEventListener('click', () => { if(currentFsCommand) { closeFullscreen(); openEdit(currentFsCommand); } });
        setupImport();
        updateSyncStatus();
        document.getElementById('quickAddCategoryBtn').addEventListener('click', () => openNewCatModal((newCat)=>{ updateCatSelect(); document.getElementById('cmdCategory').value=newCat; }));
        document.getElementById('confirmNewCatBtn').addEventListener('click', createNewCat);
        document.getElementById('cancelNewCatBtn').addEventListener('click', closeNewCatModal);
    }
    init();
</script>
</body>
</html>
